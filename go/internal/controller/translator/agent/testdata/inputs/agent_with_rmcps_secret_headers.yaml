operation: translateAgent
targetObject: agent
namespace: test
objects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: openai-secret
      namespace: test
    data:
      api-key: c2stdGVzdC1hcGkta2V5  # base64 encoded "sk-test-api-key"
  - apiVersion: v1
    kind: Secret
    metadata:
      name: servicenow-token
      namespace: test
    data:
      token: c3Qtc2VydmljZW5vdy10b2tlbg==  # base64 encoded "st-servicenow-token"
  - apiVersion: kagent.dev/v1alpha2
    kind: ModelConfig
    metadata:
      name: test-model
      namespace: test
    spec:
      provider: OpenAI
      model: gpt-4o
      apiKeySecret: openai-secret
      apiKeySecretKey: api-key
  - apiVersion: kagent.dev/v1alpha2
    kind: RemoteMCPServer
    metadata:
      name: servicenow-mcp
      namespace: test
    spec:
      url: https://instance.service-now.com/api/mcp
      description: "ServiceNow MCP Server"
      protocol: STREAMABLE_HTTP
      headersFrom:
        - name: Authorization
          valueFrom:
            type: Secret
            name: servicenow-token
            key: token
  - apiVersion: kagent.dev/v1alpha2
    kind: Agent
    metadata:
      name: agent
      namespace: test
    spec:
      type: Declarative
      declarative:
        description: An agent that uses ServiceNow MCP server with rotating auth tokens
        systemMessage: You are a ServiceNow assistant.
        modelConfig: test-model
        tools:
          - type: McpServer
            mcpServer:
              name: servicenow-mcp
              kind: RemoteMCPServer
              apiGroup: kagent.dev
              toolNames:
                - create_incident
                - list_incidents
